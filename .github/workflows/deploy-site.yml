name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/nepa_contracts.json'
      - 'data/metadata.json'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deployment directory
        run: |
          mkdir -p _deploy
          cp -r site/* _deploy/
          cp data/nepa_contracts.json _deploy/
          cp data/metadata.json _deploy/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy
      - uses: actions/deploy-pages@v4
        id: deployment
