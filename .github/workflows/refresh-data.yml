name: Refresh NEPA Contract Data

on:
  schedule:
    - cron: '17 6 1 * *'  # 1st of each month, 6:17 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m pipeline.run_pipeline --skip-enrich --output-dir data/

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/nepa_contracts.csv && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nepa_contracts.csv data/nepa_contracts.json data/metadata.json
          git commit -m "data: refresh NEPA contract data $(date +%Y-%m-%d)"
          git push
